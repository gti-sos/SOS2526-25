name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install dependencies      
        run: npm install
        
      - name: Build frontend
        run: |
          cd front
          npm install
          npm run build
        
      - name: Run all tests
        run: npm test