name: CI
on: [push,pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install dependencies      
        run: npm install
      - name: Test PSA
        run: npm run testPSA
      - name: Test JLRA 
        run : npm run testJLRA 